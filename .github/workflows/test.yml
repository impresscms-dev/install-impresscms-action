name: Tests and Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs:
      - format-check
      - lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Run tests
        run: npm run test

  format-check:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Check code formatting
        run: npm run format-check

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Lint code
        run: npm run lint

  integration:
    name: Integration (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        variant:
          - "1.0"
          - "1.2"
          - "1.3"
          - "1.4"
          - "1.5"
          - "2.0"
          - "tng"
    needs:
      - format-check
      - lint
    env:
      INTEGRATION_VARIANT: ${{ matrix.variant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: curl, gd, pdo_mysql, json, mbstring, session
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
