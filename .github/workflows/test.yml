name: Tests and Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs:
      - format-check
      - lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Run tests
        run: npm run test

  format-check:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Check code formatting
        run: npm run format-check

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Install dependencies
        run: npm install
        env:
          CI: true

      - name: Lint code
        run: npm run lint

  integration:
    name: Integration (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: "1.0"
            impresscms_ref: "impresscms_1.0.3_final"
            php_version: "5.6"
            composer_tool: "composer:v1"
          - variant: "1.2"
            impresscms_ref: "v1.2.9"
            php_version: "5.6"
            composer_tool: "composer:v1"
          - variant: "1.3"
            impresscms_ref: "v1.3.12"
            php_version: "7.2"
            composer_tool: "composer:v2"
          - variant: "1.4"
            impresscms_ref: "v1.4.6"
            php_version: "7.4"
            composer_tool: "composer:v2"
          - variant: "1.5"
            impresscms_ref: "v1.5.0-rc"
            php_version: "7.4"
            composer_tool: "composer:v2"
          - variant: "2.0"
            impresscms_ref: "v2.0.2"
            php_version: "8.3"
            composer_tool: "composer:v2"
          - variant: "tng"
            impresscms_ref: "tng"
            php_version: "8.0"
            composer_tool: "composer:v2"
    needs:
      - format-check
      - lint
    env:
      INTEGRATION_VARIANT: ${{ matrix.variant }}
      INTEGRATION_IMPRESSCMS_REF: ${{ matrix.impresscms_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
          tools: ${{ matrix.composer_tool }}
          extensions: curl, gd, pdo_mysql, json, mbstring, session
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
