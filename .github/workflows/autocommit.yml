name: Autoupdate code

on:
  push:
    branches:
      - main

concurrency:
  group: "autobuild"
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

  update-and-commit:
    name: Format code and create PR
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.IMPRESSBOT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm install

      - name: Run format
        run: npm run format

      - name: Create pull request if changes exist
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.IMPRESSBOT_TOKEN }}
          commit-message: "Format code ${{ needs.prepare.outputs.date }}"
          committer: ImpressBot <bot@impresscms.org>
          author: ImpressBot <bot@impresscms.org>
          branch: autoupdate/format-code
          delete-branch: true
          title: "Format code ${{ needs.prepare.outputs.date }}"
          body: |
            Automated formatting updates generated by `.github/workflows/autocommit.yml`.
