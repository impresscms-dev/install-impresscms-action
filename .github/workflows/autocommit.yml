name: Autoupdate code

on:
  push:
    branches:
      - main

concurrency:
  group: "autobuild"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

  update-and-commit:
    name: Update dist and autocommit
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.IMPRESSBOT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm install

      - name: Rebuild dist
        run: npm run pack

      - name: Commit and push if changes exist
        uses: stefanzweifel/git-auto-commit-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.IMPRESSBOT_TOKEN }}
        with:
          commit_message: "Update dist folder ${{ needs.prepare.outputs.date }}"
          commit_user_name: ImpressBot
          commit_user_email: bot@impresscms.org
          commit_author: ImpressBot <bot@impresscms.org>
